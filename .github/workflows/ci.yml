name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # `verify` runs the full make verify gate. `install` re-uses the
        # produced binary and exercises scripts/install-build-engine.sh
        # against a throwaway DESTDIR so the installer never bit-rots.
        # `ubuntu-24-smoke` runs the packaged installer smoke inside the
        # base Ubuntu 24.04 container image used for fresh-host validation.
        target: [verify, install, ubuntu-24-smoke]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        if: matrix.target != 'ubuntu-24-smoke'
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        if: matrix.target != 'ubuntu-24-smoke'
        run: uv python install 3.14

      - name: Install dependencies
        if: matrix.target != 'ubuntu-24-smoke'
        run: uv sync --locked --all-extras --dev

      - name: Compile
        if: matrix.target == 'verify'
        run: uv run python -m compileall src tests

      - name: Lint
        if: matrix.target == 'verify'
        run: uv run ruff check .

      - name: Format
        if: matrix.target == 'verify'
        run: uv run ruff format --check .

      - name: Type check
        if: matrix.target == 'verify'
        run: uv run ty check

      - name: Security lint
        if: matrix.target == 'verify'
        run: uv run bandit -r src/

      - name: Tests
        if: matrix.target == 'verify'
        run: uv run pytest --junitxml=reports/pytest.xml

      - name: Upload pytest JUnit XML
        if: matrix.target == 'verify' && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-junit-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/pytest.xml
          if-no-files-found: error

      - name: Binary build smoke
        if: matrix.target != 'ubuntu-24-smoke'
        run: |
          uv run pyinstaller packaging/pyinstaller/build-engine.spec --noconfirm
          ./dist/build-engine --version

      - name: Installer smoke (DESTDIR)
        if: matrix.target == 'install'
        run: |
          DESTDIR="$(mktemp -d)"
          echo "Installing into DESTDIR=$DESTDIR"
          DESTDIR="$DESTDIR" bash scripts/install-build-engine.sh
          test -x "$DESTDIR/usr/local/bin/build-engine"
          test -f "$DESTDIR/etc/mincemeat/build-engine/config.toml"
          test -f "$DESTDIR/etc/systemd/system/build-engine.service"
          "$DESTDIR/usr/local/bin/build-engine" --version
          rm -rf "$DESTDIR"

      - name: Ubuntu 24.04 container smoke
        if: matrix.target == 'ubuntu-24-smoke'
        run: |
          docker run --rm \
            -e HOST_OWNER="$(id -u):$(id -g)" \
            -v "$PWD:/workspace" \
            -w /workspace \
            ubuntu:24.04 \
            bash -lc '
              set -euo pipefail
              trap "chown -R $HOST_OWNER /workspace" EXIT
              apt-get update
              apt-get install -y ca-certificates curl git make binutils
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
              uv python install 3.14
              uv sync --locked --all-extras --dev
              make ubuntu-24-smoke
            '

  mypy-strict:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'mypy-strict')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Mypy strict
        run: uv run mypy --strict src
