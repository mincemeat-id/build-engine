name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: read
  security-events: write

concurrency:
  group: build-engine-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  matrix:
    name: Resolve release matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      targets: ${{ steps.set.outputs.targets }}
    steps:
      - id: set
        env:
          ENABLE_ARM64: ${{ vars.ENABLE_ARM64 }}
        run: |
          set -euo pipefail
          if [ "$ENABLE_ARM64" = "true" ]; then
            targets='[
              {"arch":"linux-amd64","runs_on":"ubuntu-24.04"},
              {"arch":"linux-arm64","runs_on":"ubuntu-24.04-arm"}
            ]'
          else
            targets='[
              {"arch":"linux-amd64","runs_on":"ubuntu-24.04"}
            ]'
          fi
          echo "targets=$(echo "$targets" | jq -c .)" >> "$GITHUB_OUTPUT"

  build:
    name: Build, sign, attest (${{ matrix.target.arch }})
    needs: matrix
    runs-on: ${{ matrix.target.runs_on }}
    timeout-minutes: 45
    env:
      LC_ALL: C.UTF-8
      PYTHONHASHSEED: "0"
      SOURCE_DATE_EPOCH: "0"
      TZ: UTC
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.matrix.outputs.targets) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Clean generated outputs
        run: rm -rf build dist reports trivy-results.sarif requirements-audit.txt

      - name: Verify
        run: make verify

      - name: Verify PyInstaller reproducibility
        run: |
          set -euo pipefail
          rm -rf build dist/build-engine
          uv run pyinstaller packaging/pyinstaller/build-engine.spec --noconfirm
          first="$(sha256sum dist/build-engine | awk '{print $1}')"
          rm -rf build dist/build-engine
          uv run pyinstaller packaging/pyinstaller/build-engine.spec --noconfirm
          second="$(sha256sum dist/build-engine | awk '{print $1}')"
          if [ "$first" != "$second" ]; then
            echo "::error::PyInstaller binary is not reproducible across clean rebuilds"
            echo "first=$first"
            echo "second=$second"
            exit 1
          fi

      - name: Resolve artifact names
        id: artifact
        env:
          RELEASE_ARCH: ${{ matrix.target.arch }}
        run: |
          set -euo pipefail
          version="$(./dist/build-engine --version | awk '{print $2}')"
          artifact="build-engine-${version}-${RELEASE_ARCH}"
          {
            echo "version=$version"
            echo "artifact=$artifact"
            echo "binary=dist/$artifact"
            echo "sbom=dist/$artifact.cdx.json"
          } >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ steps.artifact.outputs.sbom }}
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          scanners: vuln
          skip-dirs: ".venv,build,dist,tests/fixtures"

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          sarif_file: trivy-results.sarif

      - name: Security lint
        run: uv run bandit -r src/

      - name: Export locked dependencies for audit
        run: |
          uv export --locked --all-extras --all-groups --no-hashes \
            --format requirements.txt \
            --output-file requirements-audit.txt

      - name: Audit Python dependencies
        run: uv run --with pip-audit==2.10.0 pip-audit -r requirements-audit.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Create signed release artifacts
        env:
          COSIGN_SIGN: "1"
          RELEASE_ARCH: ${{ matrix.target.arch }}
        run: bash scripts/release-artifacts.sh

      - name: Detect optional GPG signing
        id: gpg
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          if [ -n "$GPG_SIGNING_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Optional GPG detached signature
        if: steps.gpg.outputs.enabled == 'true'
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          RELEASE_BINARY: ${{ steps.artifact.outputs.binary }}
        run: |
          set -euo pipefail
          printf '%s' "$GPG_SIGNING_KEY" | gpg --batch --import
          if [ -n "${GPG_PASSPHRASE:-}" ]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign --output "${RELEASE_BINARY}.asc" "$RELEASE_BINARY"
          else
            gpg --batch --yes --armor --detach-sign --output "${RELEASE_BINARY}.asc" "$RELEASE_BINARY"
          fi

      - name: Attest build provenance
        id: provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            ${{ steps.artifact.outputs.binary }}
            ${{ steps.artifact.outputs.sbom }}
          show-summary: true

      - name: Save provenance bundle
        env:
          BUNDLE_PATH: ${{ steps.provenance.outputs.bundle-path }}
          RELEASE_BINARY: ${{ steps.artifact.outputs.binary }}
        run: cp "$BUNDLE_PATH" "${RELEASE_BINARY}.provenance.intoto.jsonl"

      - name: Attest SBOM
        id: sbom-attestation
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-path: ${{ steps.artifact.outputs.binary }}
          sbom-path: ${{ steps.artifact.outputs.sbom }}
          show-summary: true

      - name: Save SBOM attestation bundle
        env:
          BUNDLE_PATH: ${{ steps.sbom-attestation.outputs.bundle-path }}
          RELEASE_BINARY: ${{ steps.artifact.outputs.binary }}
        run: cp "$BUNDLE_PATH" "${RELEASE_BINARY}.sbom.intoto.jsonl"

      - name: Build Debian package
        env:
          BUILD_ENGINE_BINARY: ${{ steps.artifact.outputs.binary }}
          RELEASE_ARCH: ${{ matrix.target.arch }}
          VERSION: ${{ steps.artifact.outputs.version }}
        run: bash packaging/deb/build-deb.sh

      - name: Refresh SHA256SUMS
        env:
          CHECKSUM_ONLY: "1"
          RELEASE_ARCH: ${{ matrix.target.arch }}
        run: bash scripts/release-artifacts.sh

      - name: Verify clean artifact layout
        env:
          ARTIFACT: ${{ steps.artifact.outputs.artifact }}
          RELEASE_ARCH: ${{ matrix.target.arch }}
          VERSION: ${{ steps.artifact.outputs.version }}
        run: |
          set -euo pipefail
          case "$RELEASE_ARCH" in
            linux-amd64) deb_arch=amd64 ;;
            linux-arm64) deb_arch=arm64 ;;
            *) echo "::error::unsupported release arch $RELEASE_ARCH"; exit 1 ;;
          esac
          test -x "dist/$ARTIFACT"
          test -f "dist/$ARTIFACT.sig"
          test -f "dist/$ARTIFACT.pem"
          test -f "dist/$ARTIFACT.cdx.json"
          test -f "dist/$ARTIFACT.provenance.intoto.jsonl"
          test -f "dist/$ARTIFACT.sbom.intoto.jsonl"
          test -f "dist/mincemeat-build-engine_${VERSION}_${deb_arch}.deb"
          (cd dist && sha256sum --check SHA256SUMS)

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.target.arch }}
          path: |
            dist/${{ steps.artifact.outputs.artifact }}
            dist/${{ steps.artifact.outputs.artifact }}.*
            dist/mincemeat-build-engine_*.deb
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: release-*
          path: release-assets

      - name: Combine release assets
        run: |
          set -euo pipefail
          mkdir -p release-upload
          find release-assets -type f ! -name SHA256SUMS -exec cp {} release-upload/ \;
          find release-assets -type f -name SHA256SUMS -exec cat {} \; |
            sort -u > release-upload/SHA256SUMS

      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          python - "$version" > release-notes.md <<'PY'
          import re
          import sys
          from pathlib import Path

          version = sys.argv[1]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^## \[{re.escape(version)}\](?: - \d{{4}}-\d{{2}}-\d{{2}})?\n"
              r"(?P<body>.*?)(?=^## \[|\Z)",
              re.M | re.S,
          )
          match = pattern.search(changelog)
          if match is None:
              raise SystemExit(f"CHANGELOG.md has no section for {version}")
          print(match.group("body").strip())
          PY

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: Build Engine ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body_path: release-notes.md
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          files: |
            release-upload/build-engine-*
            release-upload/mincemeat-build-engine_*.deb
            release-upload/SHA256SUMS

  align-images:
    name: Tag build-engine-images alignment
    needs: publish
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Tag image packages with engine version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          MANIFEST_URL: ${{ vars.BUILD_ENGINE_IMAGES_MANIFEST_URL }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          alignment_tag="build-engine-${version}"
          manifest_url="${MANIFEST_URL:-https://github.com/mincemeat-id/build-engine-images/releases/download/v1.0.0/manifest.json}"
          curl -fsSL "$manifest_url" -o build-engine-images-manifest.json
          expected_manifest_version="$(python - <<'PY'
          import re
          from pathlib import Path

          config = Path("src/build_engine/config.py").read_text(encoding="utf-8")
          match = re.search(r'^DEFAULT_IMAGE_MANIFEST_VERSION = "([^"]+)"$', config, re.M)
          if match is None:
              raise SystemExit("DEFAULT_IMAGE_MANIFEST_VERSION not found")
          print(match.group(1))
          PY
          )"
          actual_manifest_version="$(jq -r '.version' build-engine-images-manifest.json)"
          if [ "$actual_manifest_version" != "$expected_manifest_version" ]; then
            echo "::error::build-engine-images manifest version mismatch"
            echo "expected=$expected_manifest_version actual=$actual_manifest_version url=$manifest_url"
            exit 1
          fi
          jq -r '.images[] | [.tag, .digest] | @tsv' build-engine-images-manifest.json |
          while IFS=$'\t' read -r tag digest; do
            image="${tag%:*}"
            source_tag="${tag##*:}"
            if [ "$source_tag" = "$actual_manifest_version" ]; then
              target_tag="$alignment_tag"
            else
              track="${source_tag%-${actual_manifest_version}}"
              if [ "$track" = "$source_tag" ]; then
                echo "::error::cannot derive track from manifest tag $tag"
                exit 1
              fi
              target_tag="${track}-${alignment_tag}"
            fi
            docker buildx imagetools create \
              -t "${image}:${target_tag}" \
              "${image}@${digest}"
          done
